{% extends "base.html" %}

{% block title %}Check your email — heddle{% endblock %}

{% block content %}
<div class="flex min-h-[60vh] items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white shadow-sm rounded-lg border border-gray-200 p-8 space-y-4 text-center">
      <h1 class="text-lg font-semibold text-gray-800">Check your email</h1>
      <p class="text-sm text-gray-600">
        If an account exists for that address, we've sent a password reset link.
        Check your inbox (and spam folder).
      </p>
      <a href="/accounts/login/" class="inline-block text-sm text-indigo-600 hover:text-indigo-500">
        Back to log in
      </a>
    </div>
  </div>
</div>
{% endblock %}
