{% extends "base.html" %}

{% block title %}Password reset — heddle{% endblock %}

{% block content %}
<div class="flex min-h-[60vh] items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white shadow-sm rounded-lg border border-gray-200 p-8 space-y-4 text-center">
      <h1 class="text-lg font-semibold text-gray-800">Password reset</h1>
      <p class="text-sm text-gray-600">Your password has been set. You can now log in.</p>
      <a href="/accounts/login/"
         class="inline-block rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">
        Log in
      </a>
    </div>
  </div>
</div>
{% endblock %}
