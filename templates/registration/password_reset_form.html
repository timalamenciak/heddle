{% extends "base.html" %}

{% block title %}Reset password — heddle{% endblock %}

{% block content %}
<div class="flex min-h-[60vh] items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white shadow-sm rounded-lg border border-gray-200 p-8 space-y-5">
      <h1 class="text-lg font-semibold text-gray-800">Reset your password</h1>
      <p class="text-sm text-gray-600">Enter your email and we'll send you a reset link.</p>

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" name="email" id="id_email" autocomplete="email" required
                 class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
        </div>
        <button type="submit"
                class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
          Send reset link
        </button>
      </form>

      <div class="text-center text-sm">
        <a href="/accounts/login/" class="text-indigo-600 hover:text-indigo-500">Back to log in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
