{% extends "base.html" %}

{% block title %}Log in — heddle{% endblock %}

{% block content %}
<div class="flex min-h-[60vh] items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="login-lockup">
      {% load static %}
      <span class="login-mark">
        <img src="{% static 'img/wire-loom.png' %}" alt="">
      </span>
      <h1>Welcome to heddle</h1>
      <p>EcoWeaver engagement data, woven with provenance.</p>
    </div>

    <form method="post" class="bg-white shadow-sm rounded-lg border border-gray-200 p-8 space-y-5">
      {% csrf_token %}

      {% if form.errors %}
      <div class="rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        Invalid email or password.
      </div>
      {% endif %}

      <div>
        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="username" id="id_username" autocomplete="email" required
               class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
      </div>

      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" id="id_password" autocomplete="current-password" required
               class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
      </div>

      <button type="submit"
              class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
        Log in
      </button>

      <div class="text-center text-sm">
        <a href="/accounts/password_reset/" class="text-indigo-600 hover:text-indigo-500">
          Forgot your password?
        </a>
      </div>

      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
</div>
{% endblock %}
