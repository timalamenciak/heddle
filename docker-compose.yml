services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: heddle
      POSTGRES_USER: heddle
      POSTGRES_PASSWORD: heddle_dev
    ports:
      - "127.0.0.1:5432:5432"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heddle"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:18484:8000"
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://heddle:heddle_dev@db:5432/heddle
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
