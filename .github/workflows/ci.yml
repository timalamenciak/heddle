name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements-dev.txt
      - name: Lint and type check
        run: |
          ruff check .
          mypy .
          sha256sum -c .static-assets.sha256
      - name: Test with coverage gate
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=90
      - name: Check migrations and production settings
        env:
          DATABASE_URL: sqlite:///deploy-check.sqlite3
          SECRET_KEY: ci-only-random-looking-secret-key-with-more-than-fifty-characters-123456
          ALLOWED_HOSTS: example.test
        run: |
          python manage.py makemigrations --check --dry-run --settings=config.settings.test
          python manage.py check --deploy --settings=config.settings.production
          python manage.py collectstatic --noinput --settings=config.settings.production
      - name: Security scans
        run: |
          pip-audit -r requirements.txt
          bandit -r accounts audit config core enrichment events exporter graph importer metadata -x '*/migrations/*,*/tests/*'
      - name: Build production image
        run: docker build .
